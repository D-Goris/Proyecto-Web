<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Barajitas - Mundial 2026</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <header>
        <div class="header-container">

            <div class="header-titulo">
                <h1>Mundial 2026</h1>
                <span>Álbum Oficial de Barajitas</span>
            </div>

            <div class="header-user-info">
                <div class="group-badge">
                    <span id="group-name">Grupo</span>
                    <span id="album-progress-text" class="progress-tag">0%</span>
                </div>
                <a href="intercambio.html" class="btn-pack btn-trade" style="text-decoration: none;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                    <span>Intercambios</span>
                </a>
                <button id="btn-open-pack" class="btn-pack">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    </svg>
                    <span>Abrir Sobre</span>
                    <span id="packs-count" class="packs-badge">0</span>
                </button>
            </div>

        </div>
    </header>

    <main>
        
        <section class="album-controlador">
            <div class="controlador-container">

                <div class="pais-container">
                    <label for="pais-filtro"> País: </label>
                    <select id="pais-filtro">
                        <option value="Todas">Todas las Selecciones</option>
                    </select>
                </div>

                <div class="filtro-estado">
                    <button class="tab-btn active" data-filter="Todas" aria-selected="true">Todas</button>
                    <button class="tab-btn" data-filter="Pegadas" aria-selected="false">Pegadas</button>
                    <button class="tab-btn" data-filter="Faltantes" aria-selected="false">Faltantes</button>
                    <button class="tab-btn" data-filter="Repetidas" aria-selected="false">Repetidas</button>
                </div>

            </div>
        </section>

        <nav>

            <button id="btn-prev">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span>Anterior</span>
            </button>

            <div class="Colum-Central">
                <span id="nav-titulo">Cargando...</span>
                <span id="nav-subtitulo">Página 1 de 1</span>
            </div>

            <button id="btn-next">
                <span>Siguiente</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>

        </nav>

        <div id="album-container">

            <div id="container-spinner">
                <div class="spinner"></div>
                <p>Cargando información</p>
            </div>

        </div>

        <!--Carta-->
        <div id="card-modal" class="modal-overlay" aria-hidden="true">
            <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-card-name">
                <button id="modal-close-btn" class="modal-close" aria-label="Cerrar modal">&times;</button>

                <div class="modal-body">
                    <!-- Detailed Card Visual -->
                    <div id="modal-card-preview" class="card-detail-visual">
                        <!-- Dynamic preview rendered via JS -->
                    </div>

                    <!-- Card Metadata & Actions -->
                    <div class="card-detail-info">
                        <div class="modal-header-info">
                            <span id="modal-wc-group" class="badge-group">Grupo</span>
                            <span id="modal-card-code" class="badge-code">MEX-1</span>
                        </div>
                        <h2 id="modal-card-name" class="modal-title">Nombre del Jugador</h2>
                        <p id="modal-country-name" class="modal-country">Selección</p>

                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">Posición / Rol</span>
                                <span id="modal-card-role" class="info-value">Delantero</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Número en País</span>
                                <span id="modal-card-number" class="info-value">#1</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Estado en Álbum</span>
                                <span id="modal-card-status" class="info-value status-badge">Pegada</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Copias en Inventario</span>
                                <span id="modal-card-copies" class="info-value">1 unidad</span>
                            </div>
                        </div>

                        <!-- Acciones del modal -->
                        <div class="modal-actions">
                            <button id="btn-toggle-stuck" class="btn btn-primary">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <span id="btn-toggle-stuck-text">Pegar en Álbum</span>
                            </button>
                        </div>
                    </div>
                </div>
        </div>
    </main>

    <!--Script -->
    <script src="album.js"></script>
</body>

</html>
