<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Barajitas - Mundial 2026</title>
    <link rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="app-header">
        <div class="header-container">
            <div class="brand-text">
                <h1>Mundial 2026</h1>
                <span class="sub-title">Álbum Oficial de Barajitas</span>
            </div>
        </div>
    </header>

    <main>
        <section class="album-controls">

            <div class="control-group">
                <div class="select-wrapper">
                    <label for="country-filter" class="control-label">País:</label>
                    <select id="country-filter" class="custom-select">
                        <option value="ALL">Todas las Selecciones</option>
                    </select>
                </div>
            </div>

            <div class="filtro">
                <button class="tab-btn active" data-filter="Todas" aria-selected="true">Todas</button>
                <button class="tab-btn" data-filter="Pegadas" aria-selected="false">Pegadas</button>
                <button class="tab-btn" data-filter="Faltantes" aria-selected="false">Faltantes</button>
                <button class="tab-btn" data-filter="Repetidas" aria-selected="false">Repetidas</button>
            </div>
        </section>

        <!-- Page Pager Navigation -->
        <nav class="pager-bar">
            <button id="btn-prev-page" class="pager-btn" aria-label="Página Anterior">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span>Anterior</span>
            </button>

            <div class="pager-indicator">
                <span id="page-current-title" class="pager-title">Cargando...</span>
                <span id="page-count-subtitle" class="pager-sub">Página 1 de 1</span>
            </div>

            <button id="btn-next-page" class="pager-btn" aria-label="Página Siguiente">
                <span>Siguiente</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </nav>

        <!-- Main Content: Album View Pages -->
        <main id="album-container" class="album-container">
            <!-- Loading State -->
            <div id="loading-spinner" class="loading-state">
                <div class="spinner"></div>
                <p>Cargando información del Álbum...</p>
            </div>
        </main>

        <!-- Card Detail Modal -->
        <div id="card-modal" class="modal-overlay" aria-hidden="true">
            <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-card-name">
                <button id="modal-close-btn" class="modal-close" aria-label="Cerrar modal">&times;</button>

                <div class="modal-body">
                    <!-- Detailed Card Visual -->
                    <div id="modal-card-preview" class="card-detail-visual">
                        <!-- Dynamic preview rendered via JS -->
                    </div>

                    <!-- Card Metadata & Actions -->
                    <div class="card-detail-info">
                        <div class="modal-header-info">
                            <span id="modal-wc-group" class="badge-group">Grupo</span>
                            <span id="modal-card-code" class="badge-code">MEX-1</span>
                        </div>
                        <h2 id="modal-card-name" class="modal-title">Nombre del Jugador</h2>
                        <p id="modal-country-name" class="modal-country">Selección</p>

                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">Posición / Rol</span>
                                <span id="modal-card-role" class="info-value">Delantero</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Número en País</span>
                                <span id="modal-card-number" class="info-value">#1</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Estado en Álbum</span>
                                <span id="modal-card-status" class="info-value status-badge">Pegada</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Copias en Inventario</span>
                                <span id="modal-card-copies" class="info-value">1 unidad</span>
                            </div>
                        </div>

                        <!-- Actions to simulate album management -->
                        <div class="modal-actions">
                            <button id="btn-toggle-stuck" class="btn btn-primary">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <span id="btn-toggle-stuck-text">Pegar en Álbum</span>
                            </button>
                            <button id="btn-add-duplicate" class="btn btn-secondary">
                                + Añadir Repetida
                            </button>
                            <button id="btn-remove-duplicate" class="btn btn-danger">
                                - Quitar Repetida
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <!-- App Script -->
</body>

</html>
